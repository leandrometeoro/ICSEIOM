<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}{{ APP_SHORT }}{% endblock %} · {{ ORG }}</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<link rel="stylesheet" href="/static/css/style.css">
{% block head %}{% endblock %}
</head>
<body>
<header class="topbar">
  <div class="brand">
    <a href="/"><span class="mark">⚓</span> <strong>{{ APP_SHORT }}</strong></a>
    <span class="sub">{{ ORG }}</span>
  </div>
  <nav>
    <a href="/">Início</a>
    <a href="/metodologia">Metodologia</a>
    <a href="/historico">Histórico</a>
    {% if user %}
      <a href="/admin/dataset">Dataset</a>
      <a href="/admin">Admin</a>
      <a href="/logout" class="logout">sair ({{ user }})</a>
    {% else %}
      <a href="/login" class="login">login</a>
    {% endif %}
  </nav>
</header>

<main>
  {% block content %}{% endblock %}
</main>

<footer>
  <span>{{ APP_TITLE }}</span>
  <span>LGAF · IEAPM · Marinha do Brasil</span>
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
{% block scripts %}{% endblock %}
</body>
</html>
